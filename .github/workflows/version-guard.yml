name: Version Guard

on:
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout base branch marketplace.json
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "$BASE_REF" --depth=1

      - name: Compare versions and refs
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          base_versions=$(git show "origin/$BASE_REF:.claude-plugin/marketplace.json" | jq -r '[.plugins[].version] | sort | unique | .[]')
          pr_versions=$(jq -r '[.plugins[].version] | sort | unique | .[]' .claude-plugin/marketplace.json)

          if [ "$base_versions" != "$pr_versions" ]; then
            echo "::error::Version bump detected in a non-release PR."
            echo ""
            echo "Do not bump versions in feature PRs."
            echo "To release, run: ./scripts/release.sh <patch|minor|major>"
            exit 1
          fi

          base_refs=$(git show "origin/$BASE_REF:.claude-plugin/marketplace.json" | jq -r '[.plugins[].source.ref // empty] | sort | unique | .[]')
          pr_refs=$(jq -r '[.plugins[].source.ref // empty] | sort | unique | .[]' .claude-plugin/marketplace.json)

          if [ "$base_refs" != "$pr_refs" ]; then
            echo "::error::Source ref change detected in a non-release PR."
            echo ""
            echo "Do not change source.ref in feature PRs."
            echo "To release, run: ./scripts/release.sh <patch|minor|major>"
            exit 1
          fi

          echo "No version or ref change detected. OK."
