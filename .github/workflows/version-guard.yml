name: Version Guard

on:
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'release/') }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout base branch marketplace.json
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Compare versions
        run: |
          base_versions=$(git show origin/${{ github.base_ref }}:.claude-plugin/marketplace.json | jq -r '[.plugins[].version] | sort | unique | .[]')
          pr_versions=$(jq -r '[.plugins[].version] | sort | unique | .[]' .claude-plugin/marketplace.json)

          if [ "$base_versions" != "$pr_versions" ]; then
            echo "::error::Version bump detected in a non-release PR."
            echo ""
            echo "Do not bump versions in feature PRs."
            echo "To release, run: ./scripts/release.sh <patch|minor|major>"
            exit 1
          fi

          echo "No version change detected. OK."
