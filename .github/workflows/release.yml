name: Release

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/marketplace.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from marketplace.json
        id: version
        run: |
          unique_count=$(jq -r '[.plugins[].version] | unique | length' .claude-plugin/marketplace.json)
          if [ "$unique_count" -ne 1 ]; then
            echo "::error::Plugin versions in marketplace.json are not unified"
            exit 1
          fi
          version=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
